# ==============================================
# MS SQL Server Verbindung
# ==============================================
# Format: jdbc:sqlserver://<HOST>:<PORT>;databaseName=<DB>;<options>
# Bei lokaler Installation mit SQL Server Express: localhost\SQLEXPRESS

spring.datasource.url=jdbc:sqlserver://185.119.119.126;databaseName=DanubeDevs;encrypt=true;trustServerCertificate=true
spring.datasource.username=danube
spring.datasource.password=danube
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection Pool (HikariCP - ist default bei Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==============================================
# Server Port (Standard ist 8080, wie Express meist 3000)
# ==============================================
server.port=3000

# ==============================================
# Logging - SQL Statements anzeigen (gut zum Debuggen)
# ==============================================
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
